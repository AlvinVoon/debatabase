<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debatabase</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <header class="header">
        <h1>Debatabase</h1>
        <div class="user-info"></div>
    </header>
    <section class="hero">
        <h2>Welcome to Debatabase</h2>
        <p>Your go-to platform for engaging debate cases.</p>
        <button id="test" class="cta-button">Get Started</button>
    </section>
    <section class="documents-section">
        <h2>Debate Cases</h2>
        <div class="filter">
            <div class="filter-item">Politics</div>
            <div class="filter-item">Technology</div>
            <div class="filter-item">Environment</div>
            <div class="filter-item">Health</div>
            <div class="filter-item">Education</div>
            <div class="filter-item">IR</div>
        </div>
        <div id="documents-container" class="documents-grid"></div>
        <div class="create-btn">+</div>
    </section>
    <script type="module" src="main.js"></script>
</body>
</html>
