<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Debatabase</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="toolbar">
    <div class="motion" id="motion" contenteditable="true">Untitled</div>
    <button onclick="format('bold')"><b>B</b></button>
    <button onclick="format('italic')"><i>I</i></button>
    <button onclick="format('underline')"><u>U</u></button>
    <button onclick="format('insertUnorderedList')">• List</button>
    <button onclick="format('insertOrderedList')">1. List</button>
    <button class="save-btn">💾 Save</button>
  </div>

  <div class="editor-container">
    <div id="editor" class="editor" contenteditable="true">
      Start typing your document here...
    </div>
  </div>

  <div id="status" class="status">Saved</div>

  <script type="module"src="index.js"></script>
</body>
</html>
